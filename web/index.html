<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAS Point Cloud Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LAS Point Cloud Viewer</h1>
        </header>
        
        <div class="controls">
            <input type="file" id="fileInput" accept=".las" />
            <div id="metadata"></div>
        </div>
        
        <div class="viewer">
            <canvas id="canvas"></canvas>
            <div id="stats"></div>
        </div>
        
        <div id="error" class="error hidden"></div>
    </div>
    
    <script type="module" src="main.js"></script>
</body>
</html>
